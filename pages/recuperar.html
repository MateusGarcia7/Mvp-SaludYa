<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña - SaludYa</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <main class="login-page">

    <section class="recover-card">

      <div class="recover-icon">
        <img src="../assets/icons/recuperar.png" alt="Recuperar contraseña">
      </div>

      <h1>RECUPERA CONTRASEÑA</h1>

      <p class="recover-text">
        Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
      </p>

      <form class="recover-form">
        <label for="email">Correo Electronico Registrado</label>

        <input 
          type="email" 
          id="email" 
          placeholder="usuario@correo.com"
        >

        <button type="button" class="btn-primary" id="enviarEnlace">
          ENVIAR ENLACE
        </button>
      </form>

    </section>

  </main>

</body>
<script src="../js/recuperar.js"></script>
</html>
