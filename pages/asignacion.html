<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asignación de citas</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-logo">
            <img src="../assets/img/logo2.png" alt="SaludYa">
        </div>

        <nav class="menu">

            <a href="../pages/asignacion.html" class="menu-item active">
                <img src="../assets/icons/cita.png">
                <span>Asignación de cita</span>
            </a>

            <a href="../pages/citas-asignadas.html" class="menu-item">
                <img src="../assets/icons/lista.png">
                <span>Mis citas</span>
            </a>

            <a href="./crear-agenda.html" class="doctor-menu-item" id="crearAgenda">
        <img src="../assets/icons/cita.png" alt="">
        <span>Crear agenda</span>
      </a>
     
    </nav>

        </nav>

        <button class="logout" style="background: none; border: none; cursor: pointer;" id="logout">
            <img src="../assets/icons/logout.png">
            <span>Cerrar sesión</span>
        </button>

    </aside>

    <!-- CONTENIDO -->
    <main class="content">

        <form id="register-form">
        <h1 id="bienvenida"></h1>

        <section class="appointment-card">

            <p class="patient-name" id="patient-name"></p>

                
                <div class="top-filters">

                <div class="filter-box">
                    <label>Fecha Deseada</label>
                    <input type="date" id="fecha-deseada">
                </div>

                <div class="filter-box">
                    <label>Doctor</label>
                    <select id="doctor-select" style=" padding: 15px; border-radius: 5px; border: 1px solid #ccc;background-color: #ffffff;" required>
                        <option selected disabled>
                            Seleccione
                        </option>
                        <option>
                            Dr. Juan Pérez
                        </option>
                        <option>
                            Dra. María García
                        </option>
                    </select>
                </div>

                <div class="filter-box">
                    <label>Tipo de atención</label>
                    <input type="text" placeholder="Consulta general, especialidad, etc." id="tipo-atencion">
                </div>

            </div>

            <div class="form-area">

                <div class="left-form">

                    <textarea placeholder="Motivo consulta" id="motivo-consulta"></textarea>

                </div>

                <div class="right-form">

                    <button class="btn-primary" type="submit">
                        Confirmar cita
                    </button>

                </div>

            </div>
            
        </form> 
        </section>

    </main>

</div>
<script src="../js/asignacion.js"></script>

</body>
</html>
