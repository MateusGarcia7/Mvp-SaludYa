<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú principal - Doctor</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="doctor-dashboard">

  <aside class="doctor-sidebar">

    <div class="doctor-logo">
      <img src="../assets/img/logo2.png" alt="SaludYa">
    </div>

    <nav class="doctor-menu">
      <a href="./menu-doctor.html" class="doctor-menu-title">Menu Principal</a>

      <a href="./citas-asignadas.html" class="doctor-menu-item">
        <img src="../assets/icons/lista.png" alt="">
        <span>Citas asignadas</span>
      </a>

      <a href="./crear-agenda.html" class="doctor-menu-item">
        <img src="../assets/icons/cita.png" alt="">
        <span>Crear agenda</span>
      </a>
    </nav>

    <a href="#" class="doctor-logout" id="logoutBtn">
      <img src="../assets/icons/logout.png" alt="">
      <span>Cerrar sesión</span>
    </a>

  </aside>

  <main class="doctor-content">

    <h1>Menu principal</h1>

    <section class="doctor-summary-card">
      
      <h2 id="nombreDoctor" style="color: darkblue;"></h2>

      <div class="stats-grid">

        <div class="stat-card">
          <strong id="citasHoy">0</strong>
          <span>Citas hoy</span>
        </div>

        <div class="stat-card">
          <strong id="citasPendientes">0</strong>
          <span>Citas Pendientes</span>
        </div>

        <div class="stat-card danger">
          <strong id="citasCanceladas">0</strong>
          <span>Citas Canceladas</span>
        </div>

        <div class="stat-card success">
          <strong id="citasAtendidas">0</strong>
          <span>Citas Atendidas</span>
        </div>

      </div>

    </section>

    <section class="report-section">

      <h2>Reporte atención</h2>

      <div class="chart-card">
        <h3>Estadísticas de citas</h3>

        <div class="bar-chart">
          <div class="bar-item">
            <div class="bar bar-10" id="citasHoyBar"></div>
            <span>Citas hoy</span>
          </div>

          <div class="bar-item">
            <div class="bar bar-4" id="citasPendientesBar"></div>
            <span>Citas Pendientes</span>
          </div>

          <div class="bar-item">
            <div class="bar bar-3" id="citasCanceladasBar"></div>
            <span>Citas Canceladas</span>
          </div>

          <div class="bar-item">
            <div class="bar bar-2" id="citasAtendidasBar"></div>
            <span>Citas Atendidas</span>
          </div>
        </div>
      </div>
  <section class="doctor-summary-card" style="margin-top: 20px; color: rgb(1, 48, 119) ;">

  <h2>Próximas citas</h2>

  <div id="listaCitasDoctor">

  </div>

</section>
    </section>
  

  </main>

</div>

</body>
<script src="../js/menuDoctor.js"></script>
</html>
