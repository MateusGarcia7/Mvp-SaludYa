<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú principal - Doctor</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="doctor-dashboard">

  <aside class="doctor-sidebar">

    <div class="doctor-logo">
      <img src="../assets/img/logo2.png" alt="SaludYa">
    </div>

    <nav class="doctor-menu">
      <a href="#" class="doctor-menu-title">Menu Principal</a>

      <a href="#" class="doctor-menu-item">
        <img src="../assets/icons/lista.png" alt="">
        <span>Citas asignadas</span>
      </a>

      <a href="#" class="doctor-menu-item">
        <img src="../assets/icons/cita.png" alt="">
        <span>Crear agenda</span>
      </a>
    </nav>

    <a href="#" class="doctor-logout">
      <img src="../assets/icons/logout.png" alt="">
      <span>Cerrar sesión</span>
    </a>

  </aside>

  <main class="doctor-content">

    <h1>Menu principal</h1>

    <section class="doctor-summary-card">

      <h2>Hola Dr Juanita</h2>

      <div class="stats-grid">

        <div class="stat-card">
          <strong>10</strong>
          <span>Citas hoy</span>
        </div>

        <div class="stat-card">
          <strong>4</strong>
          <span>Citas Pendientes</span>
        </div>

        <div class="stat-card danger">
          <strong>3</strong>
          <span>Citas Canceladas</span>
        </div>

        <div class="stat-card success">
          <strong>2</strong>
          <span>Citas Atendidas</span>
        </div>

      </div>

    </section>

    <section class="report-section">

      <h2>Reporte atención</h2>

      <div class="chart-card">
        <h3>Estadísticas de citas</h3>

        <div class="bar-chart">
          <div class="bar-item">
            <div class="bar bar-10"></div>
            <span>Citas hoy</span>
          </div>

          <div class="bar-item">
            <div class="bar bar-4"></div>
            <span>Citas Pendientes</span>
          </div>

          <div class="bar-item">
            <div class="bar bar-3"></div>
            <span>Citas Canceladas</span>
          </div>

          <div class="bar-item">
            <div class="bar bar-2"></div>
            <span>Citas Atendidas</span>
          </div>
        </div>
      </div>

    </section>

  </main>

</div>

</body>
</html>
