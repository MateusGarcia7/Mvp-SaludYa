<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso Doctor - SaludYa</title>

  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <main class="login-page">

    <section class="login-card">

      <div class="login-icon">
        <img src="../assets/icons/doctor.png" alt="Doctor">
      </div>

      <h1>Ingreso como Doctor</h1>

      <form class="login-form" id="loginForm">

        <label for="email">
          Correo electronico
        </label>

        <input 
          type="email"
          id="email"
          placeholder="doctor@correo.com"
        >

        <label for="password">
          Contraseña
        </label>

        <input 
          type="password"
          id="password"
          placeholder="********"
        >

        <a href="recuperar.html" class="forgot-password">
          Olvide contraseña
        </a>

        <button type="submit" class="btn-primary">
          INGRESAR
        </button>

      </form>

    </section>

  </main>

</body>
<script src="../js/loginDoctor.js"></script>
</html>
