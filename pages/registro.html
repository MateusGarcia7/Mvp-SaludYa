<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo usuario - SaludYa</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<main class="register-page">

  <h1 class="register-title">Nuevo usuario</h1>

  <div class="register-logo">
    <img src="../assets/img/logo.png" alt="SaludYa">
  </div>

  <section class="register-card">

    <form class="register-form">

      <div class="form-column">

        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" placeholder="Nombre completo">
        </div>

        <div class="form-group">
          <label>Sexo</label>
          <select>
            <option selected disabled>
                Seleccione
             </option> 
            <option>Masculino</option>
            <option >Femenino</option>
          </select>
        </div>

        <div class="form-group">
          <label>Correo electronico</label>
          <input type="email" placeholder="usuario@correo.com">
        </div>

        <div class="form-group">
          <label>Edad</label>
          <input type="text" placeholder="0 meses a 150 años">
        </div>

        <div class="warning-box">
          <img src="../assets/icons/warning.png" alt="Advertencia">
          <p>Si es doctor (a), contacte con soporte tecnico para obtener las credenciales iniciales</p>
        </div>

      </div>

      <div class="form-column">

        <div class="form-group">
          <label>Tipo Documento identidad</label>
          <select>
             <option selected disabled>
                Seleccione
             </option>

            <option>
                CC
            </option>

            <option>
                TI
            </option>

            <option>
                CE
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Numero Documento de identidad</label>
          <input type="text" placeholder="1111111112">
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" placeholder="************">
        </div>

        <div class="form-group">
          <label>Repetir contraseña</label>
          <input type="password" placeholder="************">
        </div>

        <div class="register-actions">
          <button type="button" class="btn-primary create-btn">Crear usuario</button>
          <button type="button" class="btn-primary exit-btn">Salir</button>
        </div>

      </div>

    </form>

  </section>

</main>

</body>
</html>
